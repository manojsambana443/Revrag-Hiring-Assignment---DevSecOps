name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_HUB_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build Docker image
        run: docker build -t myuser/myapp:latest .

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: myuser/myapp:latest
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Push to Docker Hub
        run: docker push myuser/myapp:latest

      - name: Deploy to server
        run: |
          ssh deploy@${{ secrets.SERVER_IP }} \
          "docker pull myuser/myapp:latest && docker run -d -p 80:3000 myuser/myapp:latest"
