name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Login to Docker Hub using secrets
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_HUB_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      # Build Docker image
      - name: Build Docker image
        run: docker build -t manoj4449/myapp:latest .

      # Run Trivy vulnerability scan
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: manoj4449/myapp:latest
          format: table
          exit-code: 1
          severity: CRITICAL

      # Push image to Docker Hub
      - name: Push Docker image
        run: docker push manoj4449/myapp:latest

      # Deploy to server
      - name: Deploy to server
        run: |
          ssh deploy@${{ secrets.SERVER_IP }} << 'EOF'
          docker pull manoj4449/myapp:latest
          docker stop myapp || true
          docker rm myapp || true
          docker run -d --name myapp -p 80:3000 manoj4449/myapp:latest
          EOF
