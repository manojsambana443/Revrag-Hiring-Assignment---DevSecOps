      #   run: |
      #     ssh deploy@${{ secrets.SERVER_IP }} \
      #     "docker pull ${{ secrets.DOCKER_USERNAME }}/myapp:latest && docker run -d -p 80:3000 ${{ secrets.DOCKER_USERNAME }}/myapp:latest"
